map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream trello_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

sudo -u postgres psql

  CREATE USER emma_user WITH ENCRYPTED PASSWORD 'newpassword';
  CREATE DATABASE emma OWNER emma_user;
  GRANT ALL PRIVILEGES ON DATABASE emma TO emma_user;
  \q


server {
    listen 80;
    listen [::]:80;
    server_name emma.scalamatic.com www.emma.scalamatic.com;

    client_max_body_size 10m;

    location /api/socketio {
        proxy_pass http://trello_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://trello_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
