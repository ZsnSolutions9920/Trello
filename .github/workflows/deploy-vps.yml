name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote app directory exists
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"

      - name: Sync repository to VPS
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".next/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.*" \
            -e "ssh -p ${VPS_PORT:-22}" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Run remote deploy script
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SERVICE_NAME: ${{ secrets.VPS_SERVICE_NAME }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_APP_DIR' && chmod +x deploy/deploy.sh && APP_DIR='$VPS_APP_DIR' SERVICE_NAME='$VPS_SERVICE_NAME' ./deploy/deploy.sh"
